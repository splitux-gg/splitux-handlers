# Nuclear Throne - Splitux Handler
# GameMaker + goldberg. Local-split couch co-op over splitux-together.
#
# VALIDATED 2026-06-17: boots + streams clean (60fps internal cap); local-split couch via together.

name: Nuclear Throne
exec: "nuclearthrone.exe"
author: splitux
version: "1.0"
info: |
  Nuclear Throne — couch co-op via splitux-together.
  Play: launch it from splitux, then each remote player opens their invite link to join the one shared screen (local players can use a gamepad).
  Avoid: there's no in-game multiplayer menu — everyone shares a single screen and save.
spec_ver: 3
steam_appid: 242680

# Save location (auto-resolved via appid for Proton; ~ paths used as-is).
original_save_path: "AppData/Local/nuclearthrone"

coop_mode: local-split
input_isolation: none
goldberg:
  disable_networking: true
