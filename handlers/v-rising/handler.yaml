# V Rising - Splitux Handler

name: V Rising
exec: VRising.exe
author: splitux
version: "1.0"
info: |
  V Rising local co-op.

  1. Player 1: from the menu, choose Play and start or load a private game.
     Wait a few seconds for the world to load.
  2. Player 2: from the menu, choose Play and join Player 1's game.

  You'll both be in the same world together. First launch can take a little
  while to load - give it a moment.

spec_ver: 3
steam_appid: 1604030
proton_path: "Proton - Experimental"
pause_between_starts: 15.0

# Epic login.
eos:
  appid: "VRising"
  enable_lan: true
  disable_online_networking: true

# Steam networking - keep enabled (the host runs a local server).
goldberg:
  disable_networking: false
