# V Rising - Splitux Handler

name: V Rising
exec: VRising.exe
author: splitux
version: "1.0"
info: |
  V Rising — online co-op via splitux.
  Play: the host starts or loads a private game, the others join it from the in-game Play menu.
  Avoid: first launch is slow to load — let the host's world finish before joining.
spec_ver: 3
steam_appid: 1604030
proton_path: "Proton - Experimental"
pause_between_starts: 15.0

# Epic login.
eos:
  appid: "VRising"
  enable_lan: true
  disable_online_networking: true

# Steam networking - keep enabled (the host runs a local server).
goldberg:
  disable_networking: false
