# Hammerwatch - Splitux Handler
# Crackshell engine + goldberg, NATIVE Linux (Hammerwatch.bin.x86_64).
# Local-split couch co-op over splitux-together: ONE instance, up to 4 seats
# funnel in, all pads drive the one shared screen.

name: Hammerwatch
exec: "Hammerwatch.bin.x86_64"
author: splitux
version: "1.0"
info: |
  Hammerwatch — couch co-op via splitux-together.
  Play: launch it from splitux, then each remote player opens their invite link to join the one shared screen (local players can use a gamepad). Up to 4 heroes share the screen.
  Avoid: there's no online menu here — everyone shares one screen and save.
spec_ver: 3
steam_appid: 239070

# Crackshell writes under $HOME (sandbox profile home for couch). Best-guess
# path; refine after first POC. No remap/sync-back.
original_save_path: "~/.local/share/Crackshell/Hammerwatch"

# Local-splitscreen: ONE game instance driven by N seats (couch co-op).
coop_mode: local-split
input_isolation: none

# goldberg satisfies the Steam API; local couch co-op needs no networking.
goldberg:
  disable_networking: true

# boot-smoked 2026-06-23 (1 seat): boots, window maps, goldberg hooked. Couch co-op pending live POC.
