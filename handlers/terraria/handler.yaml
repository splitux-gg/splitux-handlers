# Terraria - Splitux Handler
# 2D sandbox adventure with native Linux support

name: Terraria
exec: Terraria.bin.x86_64
author: splitux
version: "1.1"
info: |
  Terraria — online co-op via splitux.
  Play: the host opens a world with Multiplayer > Host & Play, the others join via Steam / the host's session.
  Avoid: the host must be in-world before others join; one instance per player.
spec_ver: 3
steam_appid: 105600
pause_between_starts: 3.0

goldberg:
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""
