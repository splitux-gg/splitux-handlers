# Risk of Rain 2 - Splitux Handler
# Roguelike co-op shooter with Steam P2P multiplayer

name: Risk of Rain 2
exec: Risk of Rain 2.exe
author: splitux
version: "1.0"
info: |
  Risk of Rain 2 local co-op support.
  Uses Goldberg Steam Emulator with P2P connection fix plugin.
  Plugin auto-downloaded from Thunderstore on first launch.

  Setup:
  1. Both instances: Settings -> Disable crossplay
  2. Host: Multiplayer -> Host Game -> Create
  3. Host: Copy Lobby ID (button in lobby)
  4. Client: Multiplayer -> Join Clipboard Lobby
  5. Host: Start Game

spec_ver: 3
steam_appid: 632360
proton_path: "Proton - Experimental"
pause_between_starts: 5.0

goldberg:
  disable_networking: false
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""
  plugin:
    source: thunderstore
    community: riskofrain2
    package: gabrielgad/GoldbergLocalCoop
    version: "1.0.0"
