# Risk of Rain 2 - Splitux Handler
# Roguelike co-op shooter with Steam P2P multiplayer

name: Risk of Rain 2
exec: Risk of Rain 2.exe
author: splitux
version: "1.0"
info: |
  Risk of Rain 2 — online co-op via splitux.
  Play: the host opens a Private/Quickplay lobby, the others join from the in-game friends/lobby list.
  Avoid: join from the lobby before the run starts; one instance per player.
spec_ver: 3
steam_appid: 632360
# Save lives in Steam Cloud / Remote Storage (userdata/<id>/632360/remote), not the
# Proton prefix — anchored via the goldberg-emulated remote storage.
save_steam_cloud: true
proton_path: "Proton - Experimental"
pause_between_starts: 5.0

goldberg:
  disable_networking: false
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""
  plugin:
    source: thunderstore
    community: riskofrain2
    package: gabrielgad/GoldbergLocalCoop
    version: "1.0.0"
