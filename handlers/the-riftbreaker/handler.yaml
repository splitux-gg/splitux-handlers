# The Riftbreaker - Splitux Handler
# Uses disable_steam workaround to bypass gbe_fork Steam Networking Sockets bug

name: The Riftbreaker
spec_ver: 3

# Steam app ID (auto-detects install location)
steam_appid: 780310

# Save location (auto-resolved via appid for Proton; ~ paths used as-is).
original_save_path: "Documents/The Riftbreaker"

# Executable path relative to game root
exec: bin/riftbreaker_win_release.exe

# Goldberg settings
goldberg:
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""

# Game config patches - disable Steam networking to use native LAN
game_patches:
  conf/initial_config_win.cfg:
    disable_steam: "1"

# Delay between instance launches (game needs time to initialize)
pause_between_starts: 5.0

# Handler info
author: splitux
version: "1.0"
info: |
  The Riftbreaker — online co-op via splitux.
  Play: the host starts a co-op campaign/match, the others join it from the in-game menu.
  Avoid: one instance per player; the first join can take a few seconds.
