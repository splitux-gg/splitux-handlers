# Shape of Dreams - Splitux Handler
# Unity (Mono) + goldberg. ONLINE co-op over Steam P2P — netcode is Mirror +
# FizzySteamworks (SteamSockets/SNS), NOT EOS (the bundled EOSSDK is just Epic
# auth/platform). Co-op verified carrying over goldberg on the dual-instance
# bench: host created a Steam lobby, the 2nd instance joined and connected over
# SteamSockets, no bridge needed. See memory shape-of-dreams-goldberg-coop.
#
# STATUS: bench-validated; splitux-together run not yet confirmed.

name: Shape of Dreams
exec: "Shape of Dreams.exe"
author: splitux
version: "1.0"
info: |
  Shape of Dreams — online co-op via splitux.
  Play: the host starts a multiplayer game (creates a lobby); the others join from the in-game lobby/friends list.
  Avoid: one instance per player — join from the lobby before starting the run.
spec_ver: 3
steam_appid: 2444750

# Save location (auto-resolved via appid for Proton).
original_save_path: "AppData/LocalLow/Lizard Smoothie/Shape of Dreams"
save_steam_id_remap: true
proton_path: "Proton - Experimental"
pause_between_starts: 5.0

# Goldberg carries co-op: networking ENABLED for Steam lobbies + SteamSockets
# P2P (FizzySteamworks). force_lobby_type=2 (public/joinable) + invite_all so the
# instances see each other's lobby for the friends/lobby join path.
goldberg:
  disable_networking: false
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""

# EOS emu only neutralizes the incidental EOSSDK (Epic auth/platform) so it can't
# hang reaching Epic offline; co-op itself does NOT use EOS.
eos:
  appid: "2444750"
  disable_online_networking: true
