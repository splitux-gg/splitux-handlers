# ASTRONEER - Splitux Handler
# Testing with networking enabled for Steam Networking Sockets support

name: ASTRONEER
exec: Astro.exe
author: splitux
version: "1.2"
info: |
  ASTRONEER — online co-op via splitux.
  Play: one player hosts a save (Co-op), the others join it from the in-game friends/session list.
  Avoid: let the save finish loading before others join; one instance per player.
spec_ver: 3
steam_appid: 361420

# Save location (auto-resolved via appid for Proton; ~ paths used as-is).
original_save_path: "AppData/Local/Astro/Saved/SaveGames"
proton_path: "Proton - Experimental"
pause_between_starts: 8.0

# Keep networking enabled - ASTRONEER may need Steam Networking Sockets
goldberg:
  disable_networking: false
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""
