# Deep Rock Galactic - Splitux Handler
# Co-op mining FPS with Goldberg Steam Emulator

name: Deep Rock Galactic
exec: FSD.exe
author: splitux
version: "1.1"
info: |
  Deep Rock Galactic — online co-op via splitux.
  Play: the host opens a lobby on the space rig, the others join from the in-game friends list. Rock and Stone!
