# LEGO Batman: Legacy of the Dark Knight - Splitux Handler
# UE Steam+EOS. LOCAL couch co-op only (drop-in 2nd controller, no online).

name: LEGO Batman
# Launch the bootstrap launcher (it relaunches the -Shipping exe), NOT -Shipping.
exec: "LEGOBatmanLotDK.exe"
author: splitux
version: "1.0"
info: |
  LEGO Batman — couch co-op via splitux-together.
  Play: launch it from splitux, then each remote player opens their invite link to join the one shared screen (local players can use a gamepad).
  Avoid: there's no in-game multiplayer menu — everyone shares a single screen and save.
spec_ver: 3
steam_appid: 2215200

# Save location (auto-resolved via appid for Proton; ~ paths used as-is).
original_save_path: "AppData/Local/Warner Bros. Interactive Entertainment/LEGO Batman - Legacy of the Dark Knight/SaveGames/steam"
save_steam_id_remap: true

coop_mode: local-split
input_isolation: none

# Bootstrap launcher spawns the shipping exe (+ EOS/CEF subprocesses) — settle time.
pause_between_starts: 15.0

# goldberg satisfies the Steam API offline; no networking for local couch co-op.
goldberg:
  disable_networking: true

# eos_sdk_emu satisfies the Epic-account/EOS init so the game boots offline.
eos:
  appid: "2215200"
  disable_online_networking: true
