# RV There Yet? - Splitux Handler
# Co-op van road trip game with Goldberg Steam Emulator

name: RV There Yet?
exec: Ride.exe
author: splitux
version: "1.0"
info: |
  RV There Yet? — online co-op via splitux.
  Play: the host starts a game, the others join it from the in-game session/friends list.
  Avoid: one instance per player; the first join can take a few seconds.
spec_ver: 3
steam_appid: 3949040

# Save location (auto-resolved via appid for Proton; ~ paths used as-is).
original_save_path: "AppData/Local/Ride/Saved/SaveGames"
save_steam_id_remap: true
proton_path: "Proton - Experimental"
pause_between_starts: 5.0

goldberg:
  settings:
    force_lobby_type.txt: "2"
    invite_all.txt: ""
