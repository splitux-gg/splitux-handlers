# R.E.P.O. - Splitux Handler
# Co-op horror game with Photon-based multiplayer

name: R.E.P.O.
exec: REPO.exe
author: splitux
version: "1.0"
info: |
  R.E.P.O. — online co-op via splitux.
  Play: the host creates a lobby, the others join it from the in-game menu (Photon-backed).
  Avoid: one instance per player; the first join can take a few seconds.
spec_ver: 3
steam_appid: 3241660

# Save location (auto-resolved via appid for Proton; ~ paths used as-is).
original_save_path: "AppData/LocalLow/semiwork/Repo"
proton_path: "Proton - Experimental"
pause_between_starts: 5.0

photon:
  config_path: "AppData/LocalLow/semiwork/Repo/LocalMultiplayer/global.cfg"
  shared_files:
    - "AppData/LocalLow/semiwork/Repo/LocalMultiplayer/GlobalSave"
  plugin:
    source: thunderstore
    community: repo
    package: Zehs/LocalMultiplayer
    version: "1.4.0"
