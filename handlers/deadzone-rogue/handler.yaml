# Deadzone: Rogue - Splitux Handler
# DRAFT - not yet smoke-tested. Co-op transport (EOS vs Steam) unconfirmed, so
# both backends are enabled; args/info may need tuning after a first run.

name: "Deadzone: Rogue"
exec: Valhalla/Binaries/Win64/DeadzoneSteam-Win64-Shipping.exe
author: splitux
version: "0.1"
info: |
  Deadzone: Rogue local co-op.

  1. Player 1: host a co-op lobby.
  2. Player 2: join Player 1's lobby.

  First launch can take a while to load - give it a moment.

spec_ver: 3
steam_appid: 3228590
proton_path: "Proton - Experimental"
pause_between_starts: 15.0

# Loopback LAN discovery in case co-op rides EOS (harmless if it uses Steam).
env: "EOSLAN_LOCALHOST_MODE=1"

eos:
  enable_lan: true
  disable_online_networking: true

goldberg:
  disable_networking: false
