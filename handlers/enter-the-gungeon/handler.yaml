# Enter the Gungeon - Splitux Handler
# Unity + goldberg, NATIVE Linux (EtG.x86_64). Local-split couch co-op over
# splitux-together: ONE instance, 2 seats funnel in, both pads drive the shared
# screen. The Cult of the Gundead = drop-in 2nd player on the same screen.

name: Enter the Gungeon
exec: "EtG.x86_64"
author: splitux
version: "1.0"
info: |
  Enter the Gungeon — couch co-op via splitux-together.
  Play: launch it from splitux, then each remote player opens their invite link to join the one shared screen (local players can use a gamepad). Press to drop in the 2nd gungeoneer.
  Avoid: there's no online menu — everyone shares one screen and save.
spec_ver: 3
steam_appid: 311690

# Native Unity save (~ path used as-is): ~/.config/unity3d/<company>/<product>.
original_save_path: "~/.config/unity3d/Dodge Roll/Enter the Gungeon"

# Local-splitscreen: ONE game instance driven by N seats (couch co-op).
coop_mode: local-split
input_isolation: none

# goldberg satisfies the Steam API; local couch co-op needs no networking.
goldberg:
  disable_networking: true

# boot-smoked 2026-06-23 (1 seat): boots, window maps, goldberg hooked. Couch co-op pending live POC.
